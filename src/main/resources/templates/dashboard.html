<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:30px;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:40px;
}

.dashboard{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:white;
    width:250px;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card h3{
    color:#555;
    margin-bottom:15px;
}

.card h2{
    color:#764ba2;
    font-size:35px;
}

.actions{
    text-align:center;
    margin-top:40px;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    margin:10px;
    background:white;
    color:#764ba2;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#f0f0f0;
}

.logout-btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#ff4d4d;
    color:white;
    font-size:15px;
    cursor:pointer;
}

.logout-btn:hover{
    background:#e60000;
}

</style>

</head>
<body>

<h1>🏠 Room Rent Tracker Dashboard</h1>

<div class="dashboard">

    <div class="card">
        <h3>Total Tenants</h3>
        <h2 th:text="${totalTenants}"></h2>
    </div>

    <div class="card">
        <h3>Paid Tenants</h3>
        <h2 th:text="${paidTenants}"></h2>
    </div>

    <div class="card">
        <h3>Unpaid Tenants</h3>
        <h2 th:text="${unpaidTenants}"></h2>
    </div>

    <div class="card">
        <h3>Overdue Tenants</h3>
        <h2 th:text="${overdueTenants}"></h2>
    </div>

</div>

<div class="actions">

    <a href="/add-tenant" class="btn">
        ➕ Add Tenant
    </a>

    <a href="/tenants" class="btn">
        📋 View Tenants
    </a>

    <form th:action="@{/logout}" method="post">

        <button type="submit" class="logout-btn">
            Logout
        </button>

    </form>

</div>

</body>
</html>
