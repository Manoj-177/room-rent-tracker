<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    width:90%;
    max-width:1200px;
    margin:30px auto;
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:30px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card-link{
    text-decoration:none;
}

.card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:8px;
    padding:20px;
    text-align:center;
}

.card:hover{
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    cursor:pointer;
}

.card h3{
    color:#555;
    margin-bottom:15px;
}

.card h2{
    color:#007bff;
    margin:0;
}

.actions{
    text-align:center;
    margin-top:30px;
}

.btn{
    display:inline-block;
    padding:10px 20px;
    margin:5px;
    text-decoration:none;
    background:#007bff;
    color:white;
    border-radius:5px;
}

.btn:hover{
    background:#0056b3;
}

.logout-btn{
    margin-top:15px;
    padding:10px 20px;
    background:#dc3545;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.logout-btn:hover{
    background:#c82333;
}

</style>

</head>
<body>

<div class="container">


<h1>Room Rent Tracker Dashboard</h1>

<div class="dashboard">

    <a href="/tenants" class="card-link">
        <div class="card">
            <h3>Total Tenants</h3>
            <h2 th:text="${totalTenants}">0</h2>
        </div>
    </a>

    <a href="/tenants/paid" class="card-link">
        <div class="card">
            <h3>Paid Tenants</h3>
            <h2 th:text="${paidTenants}">0</h2>
        </div>
    </a>

    <a href="/tenants/unpaid" class="card-link">
        <div class="card">
            <h3>Unpaid Tenants</h3>
            <h2 th:text="${unpaidTenants}">0</h2>
        </div>
    </a>

    <a href="/tenants/overdue" class="card-link">
    <div class="card">
        <h3>Overdue Tenants</h3>
        <h2 th:text="${overdueTenants}">0</h2>
    </div>
    </a>
    <a href="/tenant-history" class="card-link">
    <div class="card">
        <h3>History</h3>
        <h2>📜</h2>
    </div>
    </a>
</div>

<div class="actions">

    <a href="/add-tenant" class="btn">
        Add Tenant
    </a>

    <a href="/tenants" class="btn">
        View Tenants
    </a>

    <form th:action="@{/logout}" method="post">

        <button type="submit" class="logout-btn">
            Logout
        </button>

    </form>

</div>


</div>

</body>
</html>
