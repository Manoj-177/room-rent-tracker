<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.login-container{
    background:white;
    padding:40px;
    border-radius:15px;
    width:400px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#555;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#764ba2;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#764ba2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5a3791;
}

.register-link{
    text-align:center;
    margin-top:20px;
}

.register-link a{
    text-decoration:none;
    color:#764ba2;
    font-weight:bold;
}

.register-link a:hover{
    text-decoration:underline;
}

</style>

</head>
<body>

<div class="login-container">

    <h2>Room Rent Tracker Login</h2>

    <form th:action="@{/login}" method="post">

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="register-link">
        <p>
            Don't have an account?
            <a th:href="@{/register}">Register</a>
        </p>
    </div>

</div>

</body>
</html>
