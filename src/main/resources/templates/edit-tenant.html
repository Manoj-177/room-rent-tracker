<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Tenant</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:600px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#555;
}

input,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#764ba2;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#764ba2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5a3791;
}

.back-link{
    text-align:center;
    margin-top:20px;
}

.back-link a{
    text-decoration:none;
    color:#764ba2;
    font-weight:bold;
}

.back-link a:hover{
    text-decoration:underline;
}

</style>

</head>
<body>

<div class="container">

    <h2>Edit Tenant</h2>

    <form th:action="@{/updateTenant}" method="post">

        <input type="hidden"
               name="id"
               th:value="${tenant.id}">

        <div class="form-group">
            <label>Name</label>
            <input type="text"
                   name="name"
                   th:value="${tenant.name}">
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text"
                   name="phone"
                   th:value="${tenant.phone}">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   name="email"
                   th:value="${tenant.email}">
        </div>

        <div class="form-group">
            <label>Room Number</label>
            <input type="text"
                   name="roomNumber"
                   th:value="${tenant.roomNumber}">
        </div>

        <div class="form-group">
            <label>Status</label>

            <select name="status">

                <option value="Paid"
                    th:selected="${tenant.status=='Paid'}">
                    Paid
                </option>

                <option value="Unpaid"
                    th:selected="${tenant.status=='Unpaid'}">
                    Unpaid
                </option>

            </select>

        </div>

        <div class="form-group">
            <label>Rent From</label>

            <input type="date"
                   name="rentFrom"
                   th:value="${tenant.rentFrom}">
        </div>

        <div class="form-group">
            <label>Rent To</label>

            <input type="date"
                   name="rentTo"
                   th:value="${tenant.rentTo}">
        </div>

        <button type="submit">
            Update Tenant
        </button>

    </form>

    <div class="back-link">
        <a href="/tenants">← Back to Tenant List</a>
    </div>

</div>

</body>
</html>
