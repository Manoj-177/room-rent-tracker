<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Tenant List</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:30px;
}

.container{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.top-actions{
    text-align:center;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    padding:10px 20px;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    margin:5px;
}

.add-btn{
    background:#764ba2;
    color:white;
}

.dashboard-btn{
    background:#28a745;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
}

thead{
    background:#764ba2;
    color:white;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tbody tr:hover{
    background:#f5f5f5;
}

.status-paid{
    color:green;
    font-weight:bold;
}

.status-unpaid{
    color:red;
    font-weight:bold;
}

.edit-btn{
    color:#007bff;
    text-decoration:none;
    font-weight:bold;
}

.delete-btn{
    color:red;
    text-decoration:none;
    font-weight:bold;
}

.edit-btn:hover,
.delete-btn:hover{
    text-decoration:underline;
}

</style>

</head>
<body>

<div class="container">

    <h2>🏠 Tenant List</h2>

    <div class="top-actions">

        <a href="/add-tenant" class="btn add-btn">
            ➕ Add Tenant
        </a>

        <a href="/dashboard" class="btn dashboard-btn">
            📊 Dashboard
        </a>

    </div>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Room No</th>
            <th>Status</th>
            <th>Rent From</th>
            <th>Rent To</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="tenant : ${tenants}">

            <td th:text="${tenant.id}"></td>
            <td th:text="${tenant.name}"></td>
            <td th:text="${tenant.phone}"></td>
            <td th:text="${tenant.email}"></td>
            <td th:text="${tenant.roomNumber}"></td>

            <td>
                <span th:if="${tenant.status == 'Paid'}"
                      class="status-paid">
                    Paid
                </span>

                <span th:if="${tenant.status == 'Unpaid'}"
                      class="status-unpaid">
                    Unpaid
                </span>
            </td>

            <td th:text="${tenant.rentFrom}"></td>
            <td th:text="${tenant.rentTo}"></td>

            <td>

                <a th:href="@{/edit-tenant/{id}(id=${tenant.id})}"
                   class="edit-btn">
                    Edit
                </a>

                |

                <a th:href="@{/delete-tenant/{id}(id=${tenant.id})}"
                   class="delete-btn"
                   onclick="return confirm('Delete this tenant?')">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
