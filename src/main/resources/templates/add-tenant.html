<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Tenant</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:600px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    color:#555;
}

input,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

input:focus,
select:focus{
    outline:none;
    border-color:#764ba2;
}

button{
    width:100%;
    padding:12px;
    background:#764ba2;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#5c3a96;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    text-decoration:none;
    color:#764ba2;
    font-weight:bold;
    margin:0 10px;
}

.links a:hover{
    text-decoration:underline;
}

</style>

</head>
<body>

<div class="container">

    <h2>Add Tenant</h2>

    <form th:action="@{/saveTenant}" method="post">

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Room Number</label>
            <input type="text" name="roomNumber" required>
        </div>

        <div class="form-group">
            <label>Payment Status</label>
            <select name="status">
                <option value="Paid">Paid</option>
                <option value="Unpaid">Unpaid</option>
            </select>
        </div>

        <div class="form-group">
            <label>Rent From</label>
            <input type="date" name="rentFrom" required>
        </div>

        <div class="form-group">
            <label>Rent To</label>
            <input type="date" name="rentTo" required>
        </div>

        <button type="submit">
            Save Tenant
        </button>

    </form>

    <div class="links">
        <a href="/dashboard">Dashboard</a>
        |
        <a href="/tenants">View Tenants</a>
    </div>

</div>

</body>
</html>
