<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.register-container{
    width:420px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#555;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#764ba2;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#764ba2;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5a3791;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#764ba2;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

</style>

</head>
<body>

<div class="register-container">

    <h2>Create Account</h2>

    <form th:action="@{/saveUser}" method="post">

        <div class="form-group">
            <label>Username</label>
            <input type="text"
                   name="username"
                   required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   name="email"
                   required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   name="password"
                   required>
        </div>

        <button type="submit">
            Register
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a th:href="@{/login}">
            Login
        </a>
    </div>

</div>

</body>
</html>
